# /etc/nginx/sites-available/qm2app
# Nginx reverse-proxy config for the QM2 Data Analysis App
#
# Enable:
#   sudo ln -s /etc/nginx/sites-available/qm2app /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream qm2app_backend {
    server 127.0.0.1:5000 fail_timeout=0;
}

# ── HTTP → HTTPS redirect (remove this block if no SSL cert yet) ─────────────
server {
    listen 80;
    server_name qm2.classe.cornell.edu;   # ← replace with your actual hostname
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name qm2.classe.cornell.edu;   # ← replace with your actual hostname

    # SSL certificate (e.g. from CLASSE/InCommon or Let's Encrypt)
    ssl_certificate     /etc/ssl/certs/qm2app.crt;
    ssl_certificate_key /etc/ssl/private/qm2app.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/qm2app_access.log;
    error_log  /var/log/nginx/qm2app_error.log;

    # ── Request size (for large POST bodies, e.g. CSV downloads) ─────────────
    client_max_body_size 20M;

    # ── Timeouts (match gunicorn; slice rendering can be slow) ───────────────
    proxy_read_timeout   120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout   120s;

    # ── Proxy to Gunicorn ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://qm2app_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_buffering    off;   # stream responses immediately (images/CSV)
    }

    # ── Static files (if you ever add a /static folder) ──────────────────────
    location /static/ {
        alias /opt/qm2app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

